version: '3.8'

services:
  invoice-processor:
    build: .
    container_name: invoice-processor
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app/results
    environment:
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
