<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能发票处理系统 | Invoice Processing System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .upload-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-zone:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-zone.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #666;
            font-size: 0.95em;
        }

        #fileInput {
            display: none;
        }

        .file-list {
            margin-top: 30px;
            display: none;
        }

        .file-list.show {
            display: block;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .file-icon {
            font-size: 2em;
            margin-right: 15px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            color: #333;
        }

        .file-size {
            font-size: 0.9em;
            color: #666;
        }

        .file-remove {
            color: #e53e3e;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .file-remove:hover {
            background: #fed7d7;
        }

        .process-btn {
            width: 100%;
            padding: 18px;
            margin-top: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .process-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .process-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .feature {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .feature-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .feature-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .feature-desc {
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>智能发票处理系统</h1>
            <p>AI-Powered Invoice Processing System</p>
        </div>

        <div class="upload-card">
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">📄</div>
                <div class="upload-text">拖拽发票文件到这里</div>
                <div class="upload-text">或点击选择文件</div>
                <div class="upload-hint">支持 JPG、PNG、PDF 格式 | 支持多文件上传</div>
            </div>

            <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.pdf">

            <div class="file-list" id="fileList"></div>

            <button class="process-btn" id="processBtn" disabled>
                开始处理 | Start Processing
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">AI 正在处理发票，请稍候...</div>
            </div>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <div class="feature-title">智能识别</div>
                <div class="feature-desc">OCR 文字识别，自动提取金额、日期、商家等信息</div>
            </div>

            <div class="feature">
                <div class="feature-icon">📂</div>
                <div class="feature-title">自动分类</div>
                <div class="feature-desc">自动归类到打车、住宿、餐饮等类别</div>
            </div>

            <div class="feature">
                <div class="feature-icon">🔗</div>
                <div class="feature-title">智能配对</div>
                <div class="feature-desc">自动匹配行程单和发票（±1天，±5%金额）</div>
            </div>

            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-title">Excel 报表</div>
                <div class="feature-desc">自动生成专业报销报表，直接提交财务</div>
            </div>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const processBtn = document.getElementById('processBtn');
        const loading = document.getElementById('loading');

        let selectedFiles = [];

        // Click to upload
        uploadZone.addEventListener('click', () => {
            fileInput.click();
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files);

            if (selectedFiles.length > 0) {
                displayFiles();
                processBtn.disabled = false;
            }
        }

        function displayFiles() {
            fileList.innerHTML = '';
            fileList.classList.add('show');

            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';

                const icon = getFileIcon(file.name);
                const size = formatFileSize(file.size);

                fileItem.innerHTML = `
                    <div class="file-icon">${icon}</div>
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${size}</div>
                    </div>
                    <div class="file-remove" onclick="removeFile(${index})">✕</div>
                `;

                fileList.appendChild(fileItem);
            });
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png', 'gif', 'bmp'].includes(ext)) {
                return '🖼️';
            } else if (ext === 'pdf') {
                return '📕';
            }
            return '📄';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            displayFiles();

            if (selectedFiles.length === 0) {
                fileList.classList.remove('show');
                processBtn.disabled = true;
            }
        }

        // Process files
        processBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            // Show loading
            processBtn.disabled = true;
            uploadZone.style.display = 'none';
            fileList.style.display = 'none';
            loading.classList.add('show');

            // Create form data
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // Get HTML response from server
                    const html = await response.text();
                    // Replace current page with results
                    document.open();
                    document.write(html);
                    document.close();
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Processing failed');
                }
            } catch (error) {
                alert('处理失败: ' + error.message);
                loading.classList.remove('show');
                uploadZone.style.display = 'block';
                fileList.style.display = 'block';
                processBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
