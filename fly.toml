# fly.toml - Fly.io deployment configuration
app = "invoice-processor"
primary_region = "sjc"

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "8000"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

[[services.tcp_checks]]
    interval = 15000
    timeout = 10000
    grace_period = "5s"
    restart_limit = 0

[metrics]
  port = 9090
  path = "/metrics"
